# Euron Agent configuration.
# Copy to `config.yaml` (or point EURON_AGENT_CONFIG at it) and edit.
#
# `active` selects which provider profile below is used by default.
# Every profile under `providers:` is OpenAI-compatible unless `type: anthropic`.
# That single OpenAI-compatible shape covers Euron/Euri, OpenAI, OpenRouter, Groq,
# Together, DeepSeek, and ANY self-hosted server that speaks the OpenAI API
# (Ollama, vLLM, LM Studio, llama.cpp, text-generation-webui, ...).

active: euri

providers:
  # ---- Euron / Euri ---------------------------------------------------------
  euri:
    type: openai           # OpenAI-compatible HTTP API
    base_url: https://api.euron.one/api/v1   # adjust to your Euri/Euron endpoint
    api_key_env: EURI_API_KEY                # key is read from this env var
    model: gpt-4.1-mini                      # whatever model id your endpoint serves
    temperature: 0.2
    max_tokens: 4096

  # ---- OpenAI ---------------------------------------------------------------
  openai:
    type: openai
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    model: gpt-4o-mini
    temperature: 0.2
    max_tokens: 4096

  # ---- OpenRouter (hundreds of models behind one OpenAI API) ----------------
  openrouter:
    type: openai
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: anthropic/claude-3.5-sonnet
    temperature: 0.2
    max_tokens: 4096

  # ---- Self-hosted: Ollama (no key needed) ----------------------------------
  ollama:
    type: openai
    base_url: http://localhost:11434/v1
    api_key_env: null         # local server, no auth
    model: qwen2.5-coder:7b
    temperature: 0.2
    max_tokens: 4096

  # ---- Self-hosted: vLLM / LM Studio / llama.cpp ----------------------------
  local:
    type: openai
    base_url: http://localhost:8001/v1
    api_key_env: null
    model: my-local-model
    temperature: 0.2
    max_tokens: 4096

  # ---- Anthropic (native API, best tool-calling) ----------------------------
  anthropic:
    type: anthropic
    base_url: null            # use SDK default
    api_key_env: ANTHROPIC_API_KEY
    model: claude-sonnet-4-6
    temperature: 0.2
    max_tokens: 4096

# Agent behaviour -------------------------------------------------------------
agent:
  max_steps: 30              # safety cap on tool-use iterations per task
  stream: true               # stream tokens as they are generated
  auto_approve_reads: true   # read_file/list_files/search never need approval
  auto_approve_writes: false # set true to skip approval for file edits (risky)
  auto_approve_commands: false
  max_file_bytes: 120000     # don't feed files larger than this to the model
  max_command_seconds: 60
  thinking: false            # enable provider-native extended thinking (Anthropic)
  reasoning_effort: null     # low|medium|high — for OpenAI o-series/reasoning models
  fallback_models: []        # try these (same provider) in order if the primary fails
                             #   e.g. ["gpt-4o", "gpt-4o-mini"]

# Fine-grained permissions (override the auto_approve_* flags). First match wins.
# Each entry is "tool" or "tool(glob)" matched against the action target
# (path for file tools, command for run_command, etc.).
permissions:
  deny:
    - run_command(rm -rf*)
    - delete_file(**/.git/**)
  ask:
    - run_command(*)
    - git_commit(*)
  allow:
    - read_file(**)
    - git_status
    - git_diff

# Hooks — shell commands run on lifecycle events. A non-zero PreToolUse exit
# BLOCKS the tool (its output is fed back to the model). Event JSON is on stdin.
hooks: {}
  # PreToolUse:
  #   - matcher: "write_file|edit_file|multi_edit"
  #     command: "ruff check ."
  # PostToolUse:
  #   - matcher: "*"
  #     command: "echo done"
  # Stop:
  #   - command: "echo finished"

# Model used for sub-agents (spawn_agent). Empty = same as the main model.
# A cheaper/faster model here saves cost on delegated sub-tasks.
subagent_model: null

# Web search backend for the web_search tool. Default is keyless DuckDuckGo.
# For better results set an API key env var (TAVILY_API_KEY / BRAVE_API_KEY /
# SERPAPI_API_KEY) and it's auto-detected, or pin it here:
web:
  provider: duckduckgo        # duckduckgo | tavily | brave | serpapi
  api_key_env: null           # e.g. TAVILY_API_KEY

# MCP (Model Context Protocol) servers — their tools become available to the
# agent as mcp__<server>__<tool>. Requires: pip install "euron-coding-agent[mcp]".
mcp:
  servers: {}
    # filesystem:
    #   command: npx
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    # remote:
    #   url: https://example.com/mcp   # SSE/HTTP endpoint

# Push agent results to chat platforms (used on task completion + by schedules).
notifications:
  on: [done]                  # which events: done | error
  slack_webhook: null         # https://hooks.slack.com/services/...
  discord_webhook: null       # https://discord.com/api/webhooks/...
  telegram_token: null        # bot token from @BotFather
  telegram_chat_id: null      # chat id to send to
  google_chat_webhook: null   # Google Chat incoming webhook URL
  twilio_sid: null            # WhatsApp via Twilio: Account SID
  twilio_token: null          #                      Auth Token
  whatsapp_from: null         #                      Twilio WhatsApp number (+1...)
  whatsapp_to: null           #                      destination number (+1...)
  linear_api_key: null        # Linear: create an issue with the result
  linear_team_id: null        #         target team id

# Files the agent must never read or write (globs, matched against rel path).
ignore:
  - ".git/**"
  - "node_modules/**"
  - "__pycache__/**"
  - ".venv/**"
  - "venv/**"
  - "dist/**"
  - "build/**"
  - "*.lock"
  - ".env"
  - ".env.*"

name: Release

# Publishes on a version tag, e.g. `git tag v1.2.0 && git push --tags`.
# Repository secrets:
#   PYPI_API_TOKEN  - PyPI token (required for the PyPI publish)
#   VSCE_PAT        - Azure DevOps PAT with Marketplace publish rights (optional)
#   OVSX_PAT        - Open VSX access token (optional; Cursor / VSCodium / Windsurf)
# If VSCE_PAT / OVSX_PAT are not set, the marketplace publish steps are skipped
# (the extension is still packaged and attached to the GitHub release).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-backend:
    name: Publish backend to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check & upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine check dist/*
          # --skip-existing makes the publish idempotent: re-runs or a version
          # already uploaded (e.g. manually) won't fail the pipeline.
          python -m twine upload --skip-existing dist/*

  publish-extension:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    # Publish the extension only after the backend it installs is on PyPI.
    needs: publish-backend
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci || npm install
      - name: Package
        run: npx vsce package --no-dependencies -o euron-agent.vsix
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --no-dependencies --packagePath euron-agent.vsix -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish euron-agent.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
      - name: Attach .vsix to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: extension/euron-agent.vsix
          generate_release_notes: true

  sync-readme:
    name: Refresh README status & commit
    runs-on: ubuntu-latest
    needs: [publish-backend, publish-extension]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend (for introspection)
        run: pip install -e backend
      - name: Regenerate README status block
        run: python scripts/update_readme_status.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet README.md; then
            git add README.md
            git commit -m "docs: refresh README status [skip ci]"
            git push origin main
          fi
